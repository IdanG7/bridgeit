name: Bug Report
description: Report a reproducible bug in DebugBridge
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the following so we can reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Commands, configs, and environment setup.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DebugBridge version
      description: Output of `debugbridge version`.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS + Build
      description: e.g. "Windows 11 Pro 23H2, build 22631.3447"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.7"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: debugbridge doctor output
      description: Paste the full output of `debugbridge doctor`.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      render: shell
